# =============================================================================
# Deploy Workflow (Orchestrator)
# =============================================================================
# Triggers on successful Container workflow completion (workflow_run).
# Chain: SIT → UAT (1 approval) → Production (2 approvals, main only)
#
# Each stage delegates to the shared reusable template:
#   .github/workflows/deploy-environment.yml
#
# Image tag is read from the deploy-metadata artifact produced by container.yml.
# Never re-derive the SHA here — it can drift across workflow_run hops.
# =============================================================================
name: Deploy

on:
  workflow_run:
    workflows: ['Container']  # CRITICAL: must match name: in container.yml exactly
    types: [completed]
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      container_run_id:
        description: 'Container workflow run ID to deploy from (required for manual dispatch)'
        required: true
        type: string

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false  # CRITICAL: Never cancel in-progress deployments

# Ceiling permissions for all called reusable workflows.
# contents: write is required by the production job to push the Git tag.
# All other permissions are needed by every environment job.
permissions:
  contents: write
  id-token: write
  actions: read

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — SIT: auto-deploys, no approval gate
  # (health_url omitted — hello-java is a plain console app with no HTTP server)
  # ---------------------------------------------------------------------------
  deploy-sit:
    name: Deploy to SIT
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment:        sit
      namespace:          sit
      timeout_minutes:    15
      health_retries:     5
      retry_delay:        10
      create_git_tag:     false
      persist_credentials: false
      container_run_id:   ${{ github.event.workflow_run.id || inputs.container_run_id }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Job 2 — UAT: requires 1 approval (configure in environment: uat settings)
  # (health_url omitted — hello-java is a plain console app with no HTTP server)
  # ---------------------------------------------------------------------------
  deploy-uat:
    name: Deploy to UAT
    needs: [deploy-sit]
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment:        uat
      namespace:          uat
      timeout_minutes:    15
      health_retries:     5
      retry_delay:        10
      create_git_tag:     false
      persist_credentials: false
      container_run_id:   ${{ github.event.workflow_run.id || inputs.container_run_id }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Job 3 — Production: requires 2 approvals, main branch only.
  # Creates an immutable Git tag on success.
  # (health_url omitted — hello-java is a plain console app with no HTTP server)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    needs: [deploy-uat]
    if: >
      github.event.workflow_run.head_branch == 'main' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/deploy-environment.yml
    with:
      environment:        production
      namespace:          production
      timeout_minutes:    20
      health_retries:     10
      retry_delay:        15
      create_git_tag:     true
      persist_credentials: true
      container_run_id:   ${{ github.event.workflow_run.id || inputs.container_run_id }}
      head_sha:           ${{ github.event.workflow_run.head_sha || github.sha }}
    secrets: inherit
