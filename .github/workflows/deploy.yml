# =============================================================================
# Deploy Workflow
# =============================================================================
# Triggers on successful Container workflow completion (workflow_run).
# Chain: deploy-staging → deploy-production (main only, ≥2 approvers required)
#
# CRITICAL: cancel-in-progress MUST be false — interrupting a kubectl rollout
# can leave pods in inconsistent states and cause data corruption.
#
# Image tag is read from the deploy-metadata artifact produced by container.yml.
# Never re-derive the SHA here — it can drift across workflow_run hops.
# =============================================================================
name: Deploy

on:
  workflow_run:
    workflows: ['Container']  # CRITICAL: must match name: in container.yml exactly
    types: [completed]
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      container_run_id:
        description: 'Container workflow run ID to deploy from (required for manual dispatch)'
        required: true
        type: string

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false  # CRITICAL: Never cancel in-progress deployments

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: deploy-sit
  # Auto-deploys to SIT AKS — no approval gate required.
  # Downloads deploy-metadata artifact from the upstream Container run,
  # sets the image via kubectl, waits for rollout, health-checks, and
  # automatically rolls back if any step fails.
  # ---------------------------------------------------------------------------
  deploy-sit:
    name: Deploy to SIT
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    environment: sit
    permissions:
      contents: read
      id-token: write  # Required for Azure OIDC
      actions: read    # Required for actions/download-artifact@v4 with run-id (cross-workflow)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download deploy-metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-metadata
          run-id: ${{ github.event.workflow_run.id || inputs.container_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read deploy metadata
        id: meta
        run: |
          echo "image_tag=$(cat image-tag)"  >> "$GITHUB_OUTPUT"
          echo "image=$(cat full-image-ref)" >> "$GITHUB_OUTPUT"
          echo "digest=$(cat image-digest)"  >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context (SIT)
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ vars.AKS_CLUSTER_NAME_SIT }}
          resource-group: ${{ vars.AKS_RESOURCE_GROUP_SIT }}

      - name: Deploy image to SIT
        run: |
          kubectl set image deployment/${{ vars.APP_NAME }} \
            ${{ vars.APP_NAME }}=${{ steps.meta.outputs.image }} \
            -n sit

      - name: Wait for rollout (SIT)
        run: |
          kubectl rollout status deployment/${{ vars.APP_NAME }} \
            -n sit \
            --timeout=5m

      - name: Health check (SIT)
        run: |
          curl --fail \
               --retry 5 \
               --retry-delay 10 \
               --retry-connrefused \
               --max-time 30 \
               ${{ vars.SIT_HEALTH_URL }}/actuator/health

      - name: Rollback on failure (SIT)
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ vars.APP_NAME }} -n sit
          kubectl rollout status deployment/${{ vars.APP_NAME }} -n sit

  # ---------------------------------------------------------------------------
  # Job 2: deploy-uat
  # Requires 1 approval (configured in environment: uat settings).
  # Runs after SIT passes.
  # ---------------------------------------------------------------------------
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: [deploy-sit]
    timeout-minutes: 15
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    environment: uat
    permissions:
      contents: read
      id-token: write  # Required for Azure OIDC
      actions: read    # Required for actions/download-artifact@v4 with run-id (cross-workflow)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download deploy-metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-metadata
          run-id: ${{ github.event.workflow_run.id || inputs.container_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read deploy metadata
        id: meta
        run: |
          echo "image_tag=$(cat image-tag)"  >> "$GITHUB_OUTPUT"
          echo "image=$(cat full-image-ref)" >> "$GITHUB_OUTPUT"
          echo "digest=$(cat image-digest)"  >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context (UAT)
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ vars.AKS_CLUSTER_NAME_UAT }}
          resource-group: ${{ vars.AKS_RESOURCE_GROUP_UAT }}

      - name: Deploy image to UAT
        run: |
          kubectl set image deployment/${{ vars.APP_NAME }} \
            ${{ vars.APP_NAME }}=${{ steps.meta.outputs.image }} \
            -n uat

      - name: Wait for rollout (UAT)
        run: |
          kubectl rollout status deployment/${{ vars.APP_NAME }} \
            -n uat \
            --timeout=5m

      - name: Health check (UAT)
        run: |
          curl --fail \
               --retry 5 \
               --retry-delay 10 \
               --retry-connrefused \
               --max-time 30 \
               ${{ vars.UAT_HEALTH_URL }}/actuator/health

      - name: Rollback on failure (UAT)
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ vars.APP_NAME }} -n uat
          kubectl rollout status deployment/${{ vars.APP_NAME }} -n uat

  # ---------------------------------------------------------------------------
  # Job 3: deploy-production
  # Requires 2 approvals (configured in environment: production settings).
  # Main-branch gate preserved. Creates immutable Git tag on success.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-uat]
    timeout-minutes: 20
    if: >
      github.event.workflow_run.head_branch == 'main' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    environment: production
    permissions:
      contents: write  # Required for git tag push
      id-token: write  # Required for Azure OIDC
      actions: read    # Required for actions/download-artifact@v4 with run-id (cross-workflow)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true  # Required for git push tag

      - name: Download deploy-metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-metadata
          run-id: ${{ github.event.workflow_run.id || inputs.container_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read deploy metadata
        id: meta
        run: |
          echo "image_tag=$(cat image-tag)"  >> "$GITHUB_OUTPUT"
          echo "image=$(cat full-image-ref)" >> "$GITHUB_OUTPUT"
          echo "digest=$(cat image-digest)"  >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context (production)
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ vars.AKS_CLUSTER_NAME_PROD }}
          resource-group: ${{ vars.AKS_RESOURCE_GROUP_PROD }}

      - name: Deploy image to production
        run: |
          kubectl set image deployment/${{ vars.APP_NAME }} \
            ${{ vars.APP_NAME }}=${{ steps.meta.outputs.image }} \
            -n production

      - name: Wait for rollout (production)
        run: |
          kubectl rollout status deployment/${{ vars.APP_NAME }} \
            -n production \
            --timeout=10m

      - name: Health check (production)
        run: |
          curl --fail \
               --retry 10 \
               --retry-delay 15 \
               --retry-connrefused \
               --max-time 30 \
               ${{ vars.PRODUCTION_HEALTH_URL }}/actuator/health

      - name: Rollback on failure (production)
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ vars.APP_NAME }} -n production
          kubectl rollout status deployment/${{ vars.APP_NAME }} -n production

      - name: Create immutable Git tag
        if: success()
        run: |
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${IMAGE_TAG}" "${{ github.event.workflow_run.head_sha || github.sha }}"
          git push origin "${IMAGE_TAG}"
