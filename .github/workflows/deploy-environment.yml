# =============================================================================
# Reusable Deploy Environment Workflow
# =============================================================================
# Called by deploy.yml for each environment (SIT → UAT → Production).
# Accepts all environment-specific parameters as inputs so the template
# remains generic and DRY across all three stages.
#
# Steps executed in every environment:
#   1. Download deploy-metadata artifact from Container run
#   2. Azure OIDC login + ACR login
#   3. Pull image
#   4. Set AKS context → apply manifest → wait for rollout
#   5. Health check (env-specific retries / delay)
#   6. Rollback on failure
#   7. Create immutable Git tag (production only, guarded by create_git_tag input)
# =============================================================================
name: Deploy Environment (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment name (sit | uat | production)'
        type: string
        required: true
      namespace:
        description: 'Kubernetes namespace to deploy into'
        type: string
        required: true
      aks_cluster_name:
        description: 'AKS cluster name'
        type: string
        required: true
      aks_resource_group:
        description: 'AKS resource group'
        type: string
        required: true
      health_url:
        description: 'Base URL for /actuator/health health check (leave empty to skip — plain apps with no HTTP server)'
        type: string
        required: false
        default: ''
      timeout_minutes:
        description: 'Job timeout in minutes'
        type: number
        required: false
        default: 15
      health_retries:
        description: 'Number of curl --retry attempts for health check'
        type: number
        required: false
        default: 5
      retry_delay:
        description: 'Seconds between health-check retries (--retry-delay)'
        type: number
        required: false
        default: 10
      create_git_tag:
        description: 'Create an immutable Git tag on successful deploy (production only)'
        type: boolean
        required: false
        default: false
      persist_credentials:
        description: 'Persist git credentials in checkout (required for git push tag)'
        type: boolean
        required: false
        default: false
      container_run_id:
        description: 'Workflow run ID of the Container workflow that produced the artifact'
        type: string
        required: true
      head_sha:
        description: 'Commit SHA to attach the Git tag to (production only)'
        type: string
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: write      # Required for git tag push (production); harmless elsewhere
      id-token: write      # Required for Azure OIDC
      actions: read        # Required for actions/download-artifact@v4 with run-id

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: ${{ inputs.persist_credentials }}

      - name: Download deploy-metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: deploy-metadata
          run-id: ${{ inputs.container_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # TODO: set CONTAINER_REGISTRY variable (e.g. myregistry.azurecr.io) — ACR login server; used for docker-login and image reference
      # TODO: set APP_NAME variable (e.g. hello-java) — image repository within the registry; change per repo when reusing this workflow
      - name: Read deploy metadata
        run: |
          IMAGE_TAG=$(cat image-tag)
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE=${{ vars.CONTAINER_REGISTRY }}/${{ vars.APP_NAME }}:${IMAGE_TAG}" >> "$GITHUB_ENV"

      # TODO: configure AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID secrets (Azure service principal with OIDC federated credentials)
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # TODO: set CONTAINER_REGISTRY variable (e.g. myregistry.azurecr.io) — ACR login server; used for Container Registry login
      - name: ACR Login
        run: |
          echo "Logging in to Azure Container Registry..."
          az acr login --name ${{ vars.CONTAINER_REGISTRY }} || {
            echo "ERROR: ACR login failed!" >&2
            exit 1
          }
          echo "ACR login successful!"

      - name: Pull image from registry
        run: |
          docker pull "$IMAGE"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name ${{ inputs.aks_cluster_name }} \
            --resource-group ${{ inputs.aks_resource_group }} \
            --overwrite-existing

      - name: Install and convert kubelogin to AAD non-interactive
        # Use azure/aks-set-context to handle login properly if possible,
        run: |
          sudo az aks install-cli
          kubelogin convert-kubeconfig -l azurecli

      - name: Update manifest image tag
        run: |
          sed -i "s|image: REPLACE_ME|image: ${IMAGE}|g" k8s/deployment.yaml

      - name: Apply manifest (rolling update)
        run: |
          kubectl apply -f k8s/deployment.yaml -n ${{ inputs.namespace }}

      - name: Health check
        # Skipped when health_url is empty (e.g. plain console apps with no HTTP server).
        # For Spring Boot apps set health_url to the base URL (e.g. https://sit.myapp.example.com).
        if: inputs.health_url != ''
        run: |
          curl --fail \
               --retry ${{ inputs.health_retries }} \
               --retry-delay ${{ inputs.retry_delay }} \
               --retry-connrefused \
               --max-time 30 \
               ${{ inputs.health_url }}/actuator/health

      - name: Create immutable Git tag
        if: success() && inputs.create_git_tag && inputs.environment == 'production'
        run: |
          TARGET_SHA="${{ inputs.head_sha || github.sha }}"
          TAGGED_AT="$(date -u +"%Y-%m-%dT%H:%MZ")"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${IMAGE_TAG}" "${TARGET_SHA}" -m "release ${IMAGE_TAG} (production) from ${TARGET_SHA} at ${TAGGED_AT}"
          git push origin "${IMAGE_TAG}"
