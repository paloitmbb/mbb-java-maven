name: "CodeQL Dynamic Analysis"

on:
  pull_request:
    branches:
      - main
      - develop
  # Makes the workflow reusable / callable from other workflows
  workflow_call:
  workflow_dispatch:

jobs:
  create-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.languages }}
    steps:
      # This step gets the languages for the repository and creates a supported
      # CodeQL language list that gets passed into the analyze step
      - name: Get languages from repo
        id: set-matrix
        uses: advanced-security/set-codeql-language-matrix@v1
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
          endpoint: ${{ github.event.repository.languages_url }}

  analyze:
    needs: create-matrix
    # Check if there are no CodeQL supported languages
    if: ${{ needs.create-matrix.outputs.matrix != '[]' }}
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Create a matrix build for all supported languages
        language: ${{ fromJSON(needs.create-matrix.outputs.matrix) }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality

    # Autobuild attempts to build any compiled languages  (C/C++, C#, or Java).
    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

  # Gate job: fixed name with no matrix — use this in branch protection rules
  # so the required check name is consistent across repos regardless of language
  codeql-gate:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [analyze]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check CodeQL results
        run: |
          if [[ "${{ needs.analyze.result }}" != "success" ]]; then
            echo "CodeQL Analysis failed or was skipped"
            exit 1
          fi
          echo "CodeQL Analysis passed"


