name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0'  # Weekly: Sunday 21:00 UTC = Monday 05:00 UTC+8

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: SBOM generation and dependency graph submission (no build dependency)
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4

      - name: Shorten commit SHA to 7 chars
        id: short_sha
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: sbom-${{ steps.short_sha.outputs.sha }}.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: CodeQL SAST — push-triggered and weekly scheduled (no build dependency)
  # ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build for CodeQL
        run: mvn --batch-mode compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build, test, package, OWASP scan — runs after Jobs 1 & 2 pass
  #         Uploads final artifacts consumed by container.yml
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: [sbom, codeql]
    timeout-minutes: 50
    permissions:
      contents: read
      checks: write
      security-events: write
      id-token: write      # Required for SLSA provenance attestation
      attestations: write  # Required for actions/attest-build-provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build, test, and package
        run: mvn --batch-mode --no-transfer-progress clean verify -P integration-test

      - name: Run integration tests (soft gate)
        run: mvn --batch-mode --no-transfer-progress verify -P integration-test -DskipUnitTests=true
        continue-on-error: true

      - name: Generate JaCoCo report
        if: always()
        run: mvn --batch-mode --no-transfer-progress jacoco:report

      - name: Enforce coverage gate (>=80% line coverage)
        run: mvn --batch-mode --no-transfer-progress jacoco:check@check

      - name: Log coverage summary
        if: always()
        shell: bash
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            # Extract line coverage percentage from the 'Total' row in the tfoot/tbody
            PERCENTAGE=$(sed -n 's/.*Total<\/td><td class="bar">.*<\/td><td class="ctr2">\([0-9]*\)%<\/td>.*/\1/p' target/site/jacoco/index.html | head -n 1)

            # Extract instructions, branches, lines, methods figures for a richer summary
            # Footer structure: Total | bar | inst_cov | bar | branch_cov | missed_cxty | cxty | missed_lines | lines | missed_methods | methods | missed_classes | classes
            LINE_COV=$(sed -n 's/.*Total<\/td>.*ctr2">\([0-9]*%\)<\/td><td class="bar">.*ctr2">\([0-9]*%\)<\/td>.*/\1/p' target/site/jacoco/index.html)
            BRANCH_COV=$(sed -n 's/.*Total<\/td>.*ctr2">[0-9]*%<\/td><td class="bar">.*ctr2">\([0-9]*%\)<\/td>.*/\1/p' target/site/jacoco/index.html)

            echo "## :bar_chart: JaCoCo Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Instruction Coverage** | \`${PERCENTAGE}%\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Branch Coverage** | \`${BRANCH_COV}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice ::Total Instruction Coverage: ${PERCENTAGE}%"
          else
            echo "::warning ::JaCoCo report index.html not found. Skipping summary."
          fi

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/*.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Resolve version metadata
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="v${VERSION}.${SHA}"
          echo "version=${VERSION}"     >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}"             >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          mkdir -p target/version-metadata
          printf '%s' "${VERSION}"   > target/version-metadata/version
          printf '%s' "${SHA}"       > target/version-metadata/sha
          printf '%s' "${IMAGE_TAG}" > target/version-metadata/image-tag

      - name: Create versioned JAR
        id: named_jar
        run: |
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          SOURCE_JAR=$(ls target/*.jar | grep -v original | head -1)
          NAMED_JAR="${ARTIFACT_ID}-${{ steps.version.outputs.version }}.${{ steps.version.outputs.sha }}.jar"
          cp "${SOURCE_JAR}" "target/${NAMED_JAR}"
          printf '%s' "${NAMED_JAR}" > target/version-metadata/jar-filename
          echo "filename=${NAMED_JAR}" >> "$GITHUB_OUTPUT"
          echo "Versioned JAR: target/${NAMED_JAR}"

      # - name: Run OWASP Dependency-Check
      #   run: mvn --batch-mode org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -Dformats=HTML,JSON,SARIF

      # - name: Upload SARIF to GitHub Security
      #   if: always()
      #   continue-on-error: true  # Requires GitHub Advanced Security; see https://github.com/paloitmbb/mbb-java-maven/settings/security_analysis
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: target/dependency-check-report.sarif
      #     category: owasp-dependency-check

      # - name: Upload dependency check report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: dependency-check-report
      #     path: target/dependency-check-report.*
      #     retention-days: 30

      - name: Attest build provenance (JAR)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/${{ steps.named_jar.outputs.filename }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: |
            target/${{ steps.named_jar.outputs.filename }}
            target/version-metadata/
          retention-days: 3
          if-no-files-found: error


