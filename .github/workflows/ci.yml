name: CI

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 0'  # Weekly: Sunday 21:00 UTC = Monday 05:00 UTC+8

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build, test, package — single Maven lifecycle (build-once principle)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build, test, and package
        run: mvn --batch-mode --no-transfer-progress clean verify -P integration-test

      - name: Run integration tests (soft gate)
        run: mvn --batch-mode --no-transfer-progress verify -P integration-test -DskipUnitTests=true
        continue-on-error: true

      - name: Generate JaCoCo report
        if: always()
        run: mvn --batch-mode --no-transfer-progress jacoco:report

      - name: Enforce coverage gate (>=80% line coverage)
        run: mvn --batch-mode --no-transfer-progress jacoco:check@check

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/*.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Normalize JAR filename
        id: jar
        run: |
          JAR=$(ls target/*.jar | grep -v original | head -1)
          cp "$JAR" target/app.jar
          echo "path=target/app.jar" >> "$GITHUB_OUTPUT"

      - name: Upload app JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/app.jar
          retention-days: 3
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: OWASP Dependency-Check security gate (parallel after build)
  # ─────────────────────────────────────────────────────────────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [build-and-package]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run OWASP Dependency-Check
        run: mvn --batch-mode org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -Dformats=HTML,JSON,SARIF

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true  # Requires GitHub Advanced Security; see https://github.com/paloitmbb/mbb-java-maven/settings/security_analysis
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: target/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: SBOM generation and dependency graph submission (parallel after build)
  # ─────────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [build-and-package]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: sbom-${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: CodeQL SAST — push-triggered and weekly scheduled (parallel after build)
  # ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [build-and-package]
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build for CodeQL
        run: mvn --batch-mode compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java
