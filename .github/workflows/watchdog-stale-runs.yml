# =============================================================================
# Watchdog — Stale Run Cleanup
# =============================================================================
# Scans all watched workflows for two categories of stale run:
#
#   1. PENDING-APPROVAL (waiting / queued) — runs stuck in an approval gate or
#      queued state longer than PENDING_SLA minutes (default: 4320 = 3 days).
#      These are cancelled via the standard cancel endpoint.
#
#   2. LONG-RUNNING (in_progress) — in_progress runs that exceed a per-workflow
#      time SLA. These are force-cancelled (GitHub's force-cancel endpoint) so
#      stuck jobs do not hold a runner or block downstream workflow_run triggers.
#      Regular cancel is retried as a fallback if force-cancel is rejected.
#
# Watched workflows and their in_progress SLA values (minutes):
#   ci.yml              → 4320 min / 3 days  (build + SBOM + CodeQL, parallel)
#   container.yml       → 4320 min / 3 days  (docker build + Trivy scan)
#   deploy.yml          → 4320 min / 3 days  (SIT → UAT → prod approval chain)
#   pr-validation.yml   → 4320 min / 3 days  (parallel gates)
#
# A step summary is always written with counts and a table of actioned runs.
# In dry-run mode (manual dispatch only) the report is produced but no runs
# are actually cancelled.
#
# Triggers:
#   schedule  — every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
#   workflow_dispatch — manual with optional dry_run, SLA overrides
# =============================================================================
name: Watchdog — Stale Run Cleanup

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect and report only, no cancellations'
        type: boolean
        required: false
        default: false
      pending_sla_minutes:
        description: 'Max minutes a run may stay in waiting/queued (pending-approval) before cancel (default: 4320 = 3 days)'
        type: string
        required: false
        default: '4320'   # 3 days — cancel approval-gate/queued runs older than this
      running_sla_minutes:
        description: 'Fallback max minutes for long-running in_progress runs if no per-workflow SLA matches (default: 4320 = 3 days)'
        type: string
        required: false
        default: '4320'   # 3 days — force-cancel runs exceeding this duration

concurrency:
  group: watchdog
  cancel-in-progress: true   # Supersede a running sweep with the newest one

permissions:
  actions: write   # Required: list and cancel workflow runs
  contents: read   # Minimum baseline for GITHUB_TOKEN

jobs:

  # ---------------------------------------------------------------------------
  # Sweep — single job that queries, evaluates, and cancels stale runs
  # ---------------------------------------------------------------------------
  sweep:
    name: Sweep Stale Runs
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Per-workflow long-running SLA (minutes) — force-cancel in_progress runs older than this
      # All set to 4320 minutes (3 days) to allow for long approval wait times
      SLA_CI:             '4320'   # 3 days
      SLA_CONTAINER:      '4320'   # 3 days
      SLA_DEPLOY:         '4320'   # 3 days (includes SIT → UAT → prod approval chain)
      SLA_PR_VALIDATION:  '4320'   # 3 days
      # Pending-approval / queued SLA — sourced from dispatch input or the 3-day default
      PENDING_SLA:        ${{ inputs.pending_sla_minutes || '4320' }}   # minutes before cancelling a waiting/queued run
      RUNNING_SLA:        ${{ inputs.running_sla_minutes || '4320' }}   # fallback for unrecognised workflows
      DRY_RUN:            ${{ inputs.dry_run || 'false' }}

    steps:

      # ─────────────────────────────────────────────────────────────────────
      # Step 1 — Sweep and cancel stale runs
      # gh CLI is pre-installed on ubuntu-latest; no checkout required.
      # ─────────────────────────────────────────────────────────────────────
      - name: Sweep and cancel stale runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
        run: |
          set -euo pipefail

          # ── Counters ──────────────────────────────────────────────────────
          CANCELLED_PENDING_APPROVAL=0    # runs cancelled from waiting/queued (pending-approval) state
          FORCE_CANCELLED_LONG_RUNNING=0  # runs force-cancelled for exceeding in_progress SLA
          FAILED_CANCEL=0
          TOTAL_PENDING_APPROVAL=0        # total runs detected in waiting/queued state
          TOTAL_LONG_RUNNING=0            # total in_progress runs detected as long-running
          declare -a REPORT_ROWS=()

          # ── Per-workflow in_progress SLA map ──────────────────────────────
          # Keys must match the exact workflow filename in .github/workflows/
          declare -A WORKFLOW_SLA=(
            ["ci.yml"]="${SLA_CI}"
            ["container.yml"]="${SLA_CONTAINER}"
            ["deploy.yml"]="${SLA_DEPLOY}"
            ["pr-validation.yml"]="${SLA_PR_VALIDATION}"
          )

          # ── Helpers ───────────────────────────────────────────────────────
          age_minutes() {
            # Returns the age of a run (in minutes) given its created_at ISO-8601 timestamp.
            local created="$1"
            local now_sec created_sec
            now_sec=$(date -u +%s)
            created_sec=$(date -u -d "$created" +%s)
            echo $(( (now_sec - created_sec) / 60 ))
          }

          cancel_run() {
            local repo="$1" run_id="$2" force="$3"
            local endpoint="repos/${repo}/actions/runs/${run_id}"
            if [[ "$force" == "true" ]]; then
              gh api -X POST "${endpoint}/force-cancel" 2>/dev/null && return 0
              # Fallback: regular cancel if force-cancel is rejected (run may have just finished)
              gh api -X POST "${endpoint}/cancel"       2>/dev/null && return 0
            else
              gh api -X POST "${endpoint}/cancel"       2>/dev/null && return 0
            fi
            return 1
          }

          # ── Main scan loop ─────────────────────────────────────────────────
          for WORKFLOW in "${!WORKFLOW_SLA[@]}"; do
            echo "--- Scanning: $WORKFLOW | long-running SLA: ${WORKFLOW_SLA[$WORKFLOW]}m | pending-approval SLA: ${PENDING_SLA}m ---"

            # Fetch all non-terminal runs for this workflow.
            # jq outputs one JSON object per line (ndjson) — safe for while-read iteration.
            while IFS= read -r RUN_JSON; do
              [[ -z "$RUN_JSON" ]] && continue

              RUN_ID=$(     echo "$RUN_JSON" | jq -r '.id')
              RUN_NUMBER=$( echo "$RUN_JSON" | jq -r '.run_number')
              RUN_STATUS=$( echo "$RUN_JSON" | jq -r '.status')
              CREATED_AT=$( echo "$RUN_JSON" | jq -r '.created_at')
              HEAD_BRANCH=$(echo "$RUN_JSON" | jq -r '.head_branch // "unknown"')

              AGE_MIN=$(age_minutes "$CREATED_AT")
              TAKE_ACTION="skip"   # skip | cancel_pending_approval | force_cancel_long_running
              TAKE_LABEL=""        # human-readable label used in logs and step summary report
              REASON=""

              # ── Evaluate against SLA thresholds ───────────────────────────
              if [[ "$RUN_STATUS" == "waiting" || "$RUN_STATUS" == "queued" ]]; then
                TOTAL_PENDING_APPROVAL=$(( TOTAL_PENDING_APPROVAL + 1 ))
                if (( AGE_MIN > PENDING_SLA )); then
                  TAKE_ACTION="cancel_pending_approval"
                  TAKE_LABEL="cancel (pending-approval)"
                  REASON="stuck in ${RUN_STATUS} for ${AGE_MIN}m — blocked on approval gate (SLA: ${PENDING_SLA}m)"
                fi

              elif [[ "$RUN_STATUS" == "in_progress" ]]; then
                WORKFLOW_SLA_MIN="${WORKFLOW_SLA[$WORKFLOW]:-${RUNNING_SLA}}"
                if (( AGE_MIN > WORKFLOW_SLA_MIN )); then
                  TOTAL_LONG_RUNNING=$(( TOTAL_LONG_RUNNING + 1 ))
                  TAKE_ACTION="force_cancel_long_running"
                  TAKE_LABEL="force-cancel (long-running)"
                  REASON="running for ${AGE_MIN}m — long-running job exceeded workflow SLA (SLA: ${WORKFLOW_SLA_MIN}m)"
                fi
              fi

              # ── Act ───────────────────────────────────────────────────────
              if [[ "$TAKE_ACTION" != "skip" ]]; then
                RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
                REPORT_ROWS+=(
                  "| \`${WORKFLOW}\` | [#${RUN_NUMBER}](${RUN_URL}) | \`${RUN_STATUS}\` | \`${HEAD_BRANCH}\` | ${AGE_MIN}m | ${TAKE_LABEL} — ${REASON} |"
                )

                if [[ "$DRY_RUN" != "true" ]]; then
                  FORCE_FLAG="false"
                  [[ "$TAKE_ACTION" == "force_cancel_long_running" ]] && FORCE_FLAG="true"

                  if cancel_run "$REPO" "$RUN_ID" "$FORCE_FLAG"; then
                    if [[ "$FORCE_FLAG" == "true" ]]; then
                      echo "::warning title=Force-Cancelled (Long-Running)::${WORKFLOW} #${RUN_NUMBER} — ${REASON}"
                      FORCE_CANCELLED_LONG_RUNNING=$(( FORCE_CANCELLED_LONG_RUNNING + 1 ))
                    else
                      echo "::notice title=Cancelled (Pending-Approval)::${WORKFLOW} #${RUN_NUMBER} — ${REASON}"
                      CANCELLED_PENDING_APPROVAL=$(( CANCELLED_PENDING_APPROVAL + 1 ))
                    fi
                  else
                    echo "::error title=Cancel failed::${WORKFLOW} #${RUN_NUMBER} — run may have already completed or lacks permission"
                    FAILED_CANCEL=$(( FAILED_CANCEL + 1 ))
                  fi
                else
                  echo "::notice title=DryRun::Would ${TAKE_LABEL} for ${WORKFLOW} #${RUN_NUMBER} — ${REASON}"
                fi
              fi

            done < <(
              gh api \
                --paginate \
                "repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=100" \
                --jq '.workflow_runs[] | select(
                  .status == "waiting"     or
                  .status == "queued"      or
                  .status == "in_progress"
                )'
            )

          done

          # ── Step Summary ──────────────────────────────────────────────────
          {
            echo "## Watchdog — Stale Run Sweep"
            echo ""

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "> **Mode: DRY RUN** — detection only. No runs were cancelled."
              echo ""
            fi

            echo "| Metric | Count |"
            echo "|---|---|"
            echo "| Pending-approval runs detected (\`waiting\` / \`queued\`) | ${TOTAL_PENDING_APPROVAL} |"
            echo "| Long-running in-progress runs detected (exceeded SLA) | ${TOTAL_LONG_RUNNING} |"
            echo "| Cancelled — pending-approval / queued SLA breach | ${CANCELLED_PENDING_APPROVAL} |"
            echo "| Force-cancelled — long-running in_progress SLA breach | ${FORCE_CANCELLED_LONG_RUNNING} |"
            echo "| Cancel failures | ${FAILED_CANCEL} |"
            echo ""

            if (( ${#REPORT_ROWS[@]} > 0 )); then
              echo "### Actioned Runs"
              echo ""
              echo "| Workflow | Run | Status | Branch | Age | Action / Reason |"
              echo "|---|---|---|---|---|---|"
              printf '%s\n' "${REPORT_ROWS[@]}"
            else
              echo "_No stale runs detected. All pipelines are within SLA._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Sweep complete — cancelled_pending_approval=${CANCELLED_PENDING_APPROVAL} force_cancelled_long_running=${FORCE_CANCELLED_LONG_RUNNING} failed=${FAILED_CANCEL}"

          # Exit non-zero if any cancellation failed, so the sweep itself is visible as failed
          if (( FAILED_CANCEL > 0 )); then
            exit 1
          fi
