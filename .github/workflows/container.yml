# =============================================================================
# Container Workflow
# =============================================================================
# Triggers on successful CI completion (workflow_run).
# Chain: build → scan → push (single job)
#
# CRITICAL: name must be exactly "Container" — referenced by deploy.yml's
# workflow_run trigger. Never rename this workflow.
# =============================================================================
name: Container

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: container-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Workflow-level env — use workflow_run SHA so tags are always correct.
# In workflow_run context github.sha resolves to the default branch HEAD,
# NOT the actual triggering commit.  Always prefer head_sha.
#
# Full image name convention: CONTAINER_REGISTRY/APP_NAME:IMAGE_TAG
#   CONTAINER_REGISTRY — ACR login server  (e.g. myregistry.azurecr.io)
#                        set as a repository/org variable; also used as docker-login login-server
#   APP_NAME           — image repository within the registry (e.g. hello-java)
#                        set as a repository variable; change per repo when reusing this workflow
#   IMAGE_TAG          — version tag derived from ci.yml (e.g. v1.0.0.abc1234)
#   FULL_IMAGE_NAME    — pre-composed registry/app-name path (no tag); used in all docker commands
# ---------------------------------------------------------------------------
env:
  CONTAINER_REGISTRY: ${{ vars.CONTAINER_REGISTRY }}   # e.g. myregistry.azurecr.io
  APP_NAME:           ${{ vars.APP_NAME }}              # e.g. hello-java (change per repo)
  IMAGE_TAG:          ${{ github.event.workflow_run.head_sha || github.sha }}
  FULL_IMAGE_NAME:    ${{ vars.CONTAINER_REGISTRY }}/${{ vars.APP_NAME }}
  TRIVY_BIN: /home/runner/.local/bin/trivy-bin/trivy

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: build-scan-push
  # Downloads the pre-built app.jar from CI, builds Docker image, runs Trivy
  # scan directly on the Docker daemon, then pushes to ACR on main/develop.
  # ─────────────────────────────────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write   # Required for Azure OIDC login

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v 6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      # Download the JAR produced by the CI build-and-package job.
      # run-id is required to fetch artifacts from an upstream workflow_run.
      - name: Download build artifact from CI
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6.0.0
        with:
          name: app-jar
          path: target/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version metadata and rename JAR
        # Reads image-tag written by ci.yml (format: v{version}.{7-char-sha})
        # so the Docker image tag is always identical to the JAR artifact name.
        run: |
          if [ ! -f target/version-metadata/jar-filename ]; then
            echo "ERROR: target/version-metadata/jar-filename not found in artifact"
            exit 1
          fi
          if [ ! -f target/version-metadata/image-tag ]; then
            echo "ERROR: target/version-metadata/image-tag not found in artifact"
            exit 1
          fi
          JAR_FILENAME=$(cat target/version-metadata/jar-filename)
          mv "target/${JAR_FILENAME}" target/app.jar
          echo "Renamed ${JAR_FILENAME} → app.jar"

          # Override IMAGE_TAG with the value produced by ci.yml so the Docker
          # image tag (e.g. v1.0.0.abc1234) matches the JAR artifact name exactly.
          CI_IMAGE_TAG=$(cat target/version-metadata/image-tag)
          echo "IMAGE_TAG=${CI_IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "Image tag from CI metadata: ${CI_IMAGE_TAG}"

      - name: Build Docker image
        # Plain docker build — no Buildx needed for single-arch builds.
        # Image stays in the Docker daemon; Trivy scans it directly below.
        # If scan passes, the image is tagged and pushed to ACR in the steps below.
        run: |
          docker build \
            --build-arg APP_VERSION="${IMAGE_TAG}" \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg REPO_URL="${{ github.server_url }}/${{ github.repository }}" \
            --tag "${FULL_IMAGE_NAME}:${IMAGE_TAG}" \
            .

      - name: Install Trivy binary
        id: install
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIVY_VERSION: v0.69.3
        run: |
          echo "::group::Install Trivy ${TRIVY_VERSION}"
          VER="${TRIVY_VERSION#v}"
          INSTALL_DIR="/home/runner/.local/bin/trivy-bin"
          mkdir -p "${INSTALL_DIR}"
          # Asset filename uses a hyphen: trivy_0.69.3_Linux-64bit.tar.gz
          ASSET="trivy_${VER}_Linux-64bit.tar.gz"
          TRIVY_URL="https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/${ASSET}"
          echo "Downloading ${ASSET} from GitHub Releases..."
          curl -fsSL \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${TRIVY_URL}" \
            | tar -xz -C "${INSTALL_DIR}" trivy
          chmod +x "${INSTALL_DIR}/trivy"
          "${INSTALL_DIR}/trivy" --version
          echo "TRIVY_BIN=${INSTALL_DIR}/trivy" >> "$GITHUB_ENV"
          echo "::endgroup::"

      - name: Run Trivy vulnerability scan
        run: |
          ${TRIVY_BIN} image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --exit-code 1 \
            --ignore-unfixed \
            "${FULL_IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

      # ── Push to ACR (main / develop branches only) ──────────────────────
      # Azure OIDC login — no stored credentials, short-lived token only.
      # TODO: configure AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID secrets
      - name: Azure login (OIDC)
        if: >
          github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.head_branch == 'main'
        id: azure-login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: |
          echo "Logging in to Azure Container Registry..."
          az acr login --name ${{ env.CONTAINER_REGISTRY }} || {
            echo "ERROR: ACR login failed!" >&2
            exit 1
          }
          echo "ACR login successful!"

      - name: Tag and push to ACR
        if: >
          github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.head_branch == 'main'
        id: push
        run: |
          # Push versioned tag
          docker push "${FULL_IMAGE_NAME}:${IMAGE_TAG}"

          # Push latest tag
          docker tag "${FULL_IMAGE_NAME}:${IMAGE_TAG}" "${FULL_IMAGE_NAME}:latest"
          docker push "${FULL_IMAGE_NAME}:latest"

          echo "image=${FULL_IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"                >> "$GITHUB_OUTPUT"

      - name: Write image publish summary
        if: steps.push.outcome == 'success'
        run: |
          {
            echo "## :whale: Container Image Published to ACR"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| **Image** | \`${{ steps.push.outputs.image }}\` |"
            echo "| **Tag** | \`${{ steps.push.outputs.image_tag }}\` |"
            echo "| **Commit SHA** | \`${{ env.IMAGE_TAG }}\` |"
            echo "| **Published at** | $(date -u +'%Y-%m-%dT%H:%M:%SZ') |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy-metadata artifact
        if: steps.push.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: deploy-metadata
          path: |
            target/version-metadata/image-tag
          retention-days: 1
          if-no-files-found: error

