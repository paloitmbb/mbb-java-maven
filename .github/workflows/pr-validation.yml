name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Pre-warm Maven dependency cache
  # ─────────────────────────────────────────────────────────────────────────────
  setup-cache:
    name: Setup Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Warm Maven dependency cache
        run: mvn --batch-mode --no-transfer-progress dependency:go-offline

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Compile, unit test, coverage gate, publish results
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [setup-cache]
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress clean compile

      - name: Run unit tests
        run: mvn --batch-mode --no-transfer-progress test

      - name: Generate JaCoCo report
        if: always()
        run: mvn --batch-mode --no-transfer-progress jacoco:report

      - name: Enforce coverage gate (≥80% line coverage)
        run: mvn --batch-mode --no-transfer-progress jacoco:check@check

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: target/surefire-reports/*.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-reports
          path: target/surefire-reports/
          retention-days: 5

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-report
          path: target/site/jacoco/
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Checkstyle + SpotBugs quality gates
  # ─────────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [setup-cache]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn --batch-mode --no-transfer-progress compile checkstyle:check

      - name: SpotBugs
        run: mvn --batch-mode --no-transfer-progress compile spotbugs:check

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/spotbugsXml.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: CodeQL SAST (skipped on forks)
  # ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: [setup-cache]
    timeout-minutes: 30
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build for CodeQL
        run: mvn --batch-mode --no-transfer-progress compile -DskipTests

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: TruffleHog secrets scan (runs fully in parallel — no Maven)
  # Uses TruffleHog OSS binary directly (not the GitHub Action) to avoid the
  # AGPL-3.0 license of the trufflesecurity/trufflehog action being flagged by
  # the dependency-review-action, which denies AGPL-3.0 licensed dependencies.
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for TruffleHog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install TruffleHog
        run: |
          set -eo pipefail
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v3.93.7/trufflehog_3.93.7_linux_amd64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin trufflehog

      - name: Detect secrets with TruffleHog
        run: |
          trufflehog git file://. \
            --since-commit "${{ github.event.pull_request.base.sha }}" \
            --only-verified \
            --fail

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Dependency review — checks new deps for vulns/license issues
  # Requires: Dependency graph enabled + GitHub Advanced Security (GHAS).
  # Enable both at: https://github.com/paloitmbb/mbb-java-maven/settings/security_analysis
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, AGPL-3.0
          comment-summary-in-pr: on-failure
