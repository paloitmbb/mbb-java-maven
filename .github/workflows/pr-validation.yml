name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Pre-warm Maven dependency cache
  # ─────────────────────────────────────────────────────────────────────────────
  setup-cache:
    name: Setup Cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0 
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Warm Maven dependency cache
        run: mvn --batch-mode --no-transfer-progress dependency:go-offline

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Compile, unit test, coverage gate, publish results
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [setup-cache]
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v 5.2.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn --batch-mode --no-transfer-progress clean compile

      - name: Run unit tests
        run: mvn --batch-mode --no-transfer-progress test

      - name: Generate JaCoCo report
        if: always()
        run: mvn --batch-mode --no-transfer-progress jacoco:report

      - name: Enforce coverage gate (≥80% line coverage)
        run: mvn --batch-mode --no-transfer-progress jacoco:check@check

      - name: Log coverage summary
        if: always()
        shell: bash
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            # Extract line coverage percentage from the 'Total' row in the tfoot/tbody
            PERCENTAGE=$(sed -n 's/.*Total<\/td><td class="bar">.*<\/td><td class="ctr2">\([0-9]*\)%<\/td>.*/\1/p' target/site/jacoco/index.html | head -n 1)

            # Extract instructions, branches, lines, methods figures for a richer summary
            # Footer structure: Total | bar | inst_cov | bar | branch_cov | missed_cxty | cxty | missed_lines | lines | missed_methods | methods | missed_classes | classes
            LINE_COV=$(sed -n 's/.*Total<\/td>.*ctr2">\([0-9]*%\)<\/td><td class="bar">.*ctr2">\([0-9]*%\)<\/td>.*/\1/p' target/site/jacoco/index.html)
            BRANCH_COV=$(sed -n 's/.*Total<\/td>.*ctr2">[0-9]*%<\/td><td class="bar">.*ctr2">\([0-9]*%\)<\/td>.*/\1/p' target/site/jacoco/index.html)

            echo "## :bar_chart: JaCoCo Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Instruction Coverage** | \`${PERCENTAGE}%\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Branch Coverage** | \`${BRANCH_COV}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice ::Total Instruction Coverage: ${PERCENTAGE}%"
          else
            echo "::warning ::JaCoCo report index.html not found. Skipping summary."
          fi

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@013b82b5ab2f4b8996f689eb33ec94a96f30c437
        with:
          files: target/surefire-reports/*.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: pr-test-reports
          path: target/surefire-reports/
          retention-days: 5

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: pr-coverage-report
          path: target/site/jacoco/
          retention-days: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Checkstyle + SpotBugs quality gates
  # ─────────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [setup-cache]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn --batch-mode --no-transfer-progress compile checkstyle:check

      - name: SpotBugs
        run: mvn --batch-mode --no-transfer-progress compile spotbugs:check

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f   # v7.0.0
        with:
          name: quality-reports
          path: |
            target/checkstyle-result.xml
            target/spotbugsXml.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: TruffleHog secrets scan (runs fully in parallel — no Maven)
  # Uses TruffleHog OSS binary directly (not the GitHub Action) to avoid the
  # AGPL-3.0 license of the trufflesecurity/trufflehog action being flagged by
  # the dependency-review-action, which denies AGPL-3.0 licensed dependencies.
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for TruffleHog)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install TruffleHog
        run: |
          set -eo pipefail
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v3.93.7/trufflehog_3.93.7_linux_amd64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/bin trufflehog

      - name: Detect secrets with TruffleHog
        run: |
          trufflehog git file://. \
            --since-commit "${{ github.event.pull_request.base.sha }}" \
            --only-verified \
            --fail

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Dependency review — checks new deps for vulns/license issues
  # Requires: Dependency graph enabled + GitHub Advanced Security (GHAS).
  # Enable both at: https://github.com/paloitmbb/mbb-java-maven/settings/security_analysis
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, AGPL-3.0
          comment-summary-in-pr: always
